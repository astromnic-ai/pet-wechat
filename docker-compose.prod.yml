services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pet
      POSTGRES_PASSWORD: pet123
      POSTGRES_DB: pet_wechat
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pet -d pet_wechat"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: ghcr.io/thup-jds/pet-wechat/server:latest
    restart: unless-stopped
    ports:
      - "9527:9527"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_KEY: ${ADMIN_KEY}
      DATABASE_URL: postgresql://pet:pet123@postgres:5432/pet_wechat
      PORT: "9527"
      WX_APPID: ${WX_APPID}
      WX_SECRET: ${WX_SECRET}
      DEVICE_REPORT_SECRET: ${DEVICE_REPORT_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: pet-uploads
      S3_PUBLIC_URL: https://pet-wechat.yangl.com.cn/storage
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY}
      TENCENT_SMS_APP_ID: ${TENCENT_SMS_APP_ID}
      TENCENT_SMS_SIGN_NAME: ${TENCENT_SMS_SIGN_NAME}
      TENCENT_SMS_TEMPLATE_ID: ${TENCENT_SMS_TEMPLATE_ID}
      TENCENT_SMS_REGION: ${TENCENT_SMS_REGION:-ap-guangzhou}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: nickfedor/watchtower:latest
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_LABEL_ENABLE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # 挂载主机的 docker 凭据以便对私有 GHCR 镜像执行 HEAD digest 检查；
      # 缺失会导致 watchtower 持续 403、updated=0，无法热更新。
      - ${HOME}/.docker/config.json:/config.json:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  pg_data:
  minio_data:
